<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu Runner</title>

    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <div class="info">
        <h2>Pulos: <span id="pulos">0</span></h2>
        <h2>Tempo: <span id="tempo">0</span>s</h2>
        <h2>Energia: <span id="energia">0</span>%</h2>
    </div>

    <div class="game">

        <img src="cenario.jpg" class="cenario">

        <img src="bola.png" class="bola">

        <img src="raio.png" class="raio">

        <img src="pikachu.gif" class="pikachu">

    </div>

    <div class="game-over">

        <div class="painel">

            <h1>GAME OVER</h1>

            <button class="reiniciar">
                REINICIAR
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
